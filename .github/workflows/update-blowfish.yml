name: Update Blowfish Theme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  update-theme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest Blowfish version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/nunocoracao/blowfish/releases/latest \
          | grep tag_name | cut -d '"' -f 4)

          SAFE_VERSION=$(echo $VERSION | sed 's/\./-/g')

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SAFE_VERSION=$SAFE_VERSION" >> $GITHUB_ENV

      - name: Download Blowfish
        run: |
          curl -L -o blowfish.zip \
          https://github.com/nunocoracao/blowfish/archive/refs/tags/${{ env.VERSION }}.zip

      - name: Replace theme
        run: |
          rm -rf themes/blowfish
          mkdir -p themes/blowfish
          unzip blowfish.zip -d temp
          mv temp/blowfish-*/* themes/blowfish
          rm -rf temp blowfish.zip

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: update-blowfish-${{ env.SAFE_VERSION }}
          commit-message: "Update Blowfish to ${{ env.VERSION }}"
          title: "🔄 Update Blowfish to ${{ env.VERSION }}"
          body: |
            ## 🔄 Blowfish Theme Update

            This PR updates the theme to **${{ env.VERSION }}**

            ### ✅️ Changes
            - Updated `themes/blowfish/` to latest release

            ### ⚠️ Checklist
            - [ ] Build passes
            - [ ] No visual regressions
            - [ ] Config compatibility checked

            ---
            🤖 Auto-generated by GitHub Actions
          labels: |
            dependencies
            automated
