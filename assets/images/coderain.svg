<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1084 322"
  width="1084"
  height="322"
  preserveAspectRatio="xMidYMid slice"
  aria-hidden="true"
>
  <defs>
    <style>
      text {
        font-family: ui-monospace, "Courier New", Courier, monospace;
        font-size: 14px;
      }

      .c1 { fill: #1b5e20; }
      .c2 { fill: #33691e; }
      .c3 { fill: #558b2f; }
      .c4 { fill: #7cb342; }
      .c5 { fill: #aed581; }

      .b1 { fill: #37474f; }
      .b2 { fill: #455a64; }
      .b3 { fill: #546e7a; }
      .b4 { fill: #78909c; }
      .b5 { fill: #b0bec5; }

      .head { fill: #c8e6c9; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect fill="#70BAD4" width="1084" height="322"/>

  <!-- 雨列 1 -->
  <g>
    <text x="60" y="-20">
      <tspan dy="0" class="c1">let</tspan>
      <tspan dy="16" class="c2">if</tspan>
      <tspan dy="16" class="c3">match</tspan>
      <tspan dy="16" class="c4">loop</tspan>
      <tspan dy="16" class="head">use</tspan>
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="0 342" dur="10s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 雨列 2 -->
  <g>
    <text x="180" y="-60">
      <tspan dy="0" class="b1">==</tspan>
      <tspan dy="16" class="b2">?:</tspan>
      <tspan dy="16" class="b3">=&gt;</tspan>
      <tspan dy="16" class="b4">$</tspan>
      <tspan dy="16" class="head">_</tspan>
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="0 342" dur="12s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 雨列 3 -->
  <g>
    <text x="320" y="-40">
      <tspan dy="0" class="c1">?.</tspan>
      <tspan dy="16" class="c2">&amp;-</tspan>
      <tspan dy="16" class="c3">&amp;?</tspan>
      <tspan dy="16" class="c4">&amp;+</tspan>
      <tspan dy="16" class="head">&amp;&amp;</tspan>
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="0 342" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 雨列 4 -->
  <g>
    <text x="460" y="-80">
      <tspan dy="0" class="b1">||</tspan>
      <tspan dy="16" class="b2">|</tspan>
      <tspan dy="16" class="b3">string</tspan>
      <tspan dy="16" class="b4">list</tspan>
      <tspan dy="16" class="head">map</tspan>
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="0 342" dur="14s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 雨列 5 -->
  <g>
    <text x="600" y="-30">
      <tspan dy="0" class="c1">sys</tspan>
      <tspan dy="16" class="c2">regex</tspan>
      <tspan dy="16" class="c3">table</tspan>
      <tspan dy="16" class="c4">log</tspan>
      <tspan dy="16" class="head">math</tspan>
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="0 342" dur="11s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 雨列 6 -->
  <g>
    <text x="760" y="-70">
      <tspan dy="0" class="b1">3M</tspan>
      <tspan dy="16" class="b2">5G</tspan>
      <tspan dy="16" class="b3">1+2</tspan>
      <tspan dy="16" class="b4">.red()</tspan>
      <tspan dy="16" class="head">.sum()</tspan>
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="0 342" dur="13s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 雨列 7 -->
  <g>
    <text x="920" y="-50">
      <tspan dy="0" class="c1">let</tspan>
      <tspan dy="16" class="c2">import</tspan>
      <tspan dy="16" class="c3">match</tspan>
      <tspan dy="16" class="c4">sys</tspan>
      <tspan dy="16" class="head">math</tspan>
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="0 342" dur="15s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 雨列 8 -->
  <g>
    <text x="1040" y="-90">
      <tspan dy="0" class="b1">loop</tspan>
      <tspan dy="16" class="b2">map</tspan>
      <tspan dy="16" class="b3">log</tspan>
      <tspan dy="16" class="b4">3M</tspan>
      <tspan dy="16" class="head">5G</tspan>
      <animateTransform attributeName="transform" type="translate"
        from="0 0" to="0 342" dur="16s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
