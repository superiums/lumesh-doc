<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义内联样式和滤镜 -->
  <defs>
    <!-- Lume 蓝色渐变 -->
    <linearGradient id="gradLume" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5cdf;stop-opacity:1" />
    </linearGradient>
    <!-- Bash 绿色渐变 -->
    <linearGradient id="gradBash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ae582;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fc956;stop-opacity:1" />
    </linearGradient>
    <!-- dash 黄色渐变 -->
    <linearGradient id="gradDash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c040;stop-opacity:1" />
    </linearGradient>
    <!-- fish 红色渐变 -->
    <linearGradient id="gradFish" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="#0f1729"/>

  <!-- 标题 -->
  <text x="400" y="35" font-family="sans-serif" font-size="24" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    Elapsed Time
  </text>
  <text x="400" y="58" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    one million times
  </text>

  <!-- Y轴 -->
  <line x1="100" y1="480" x2="700" y2="480" stroke="#334155" stroke-width="2"/>
  
  <!-- Y轴刻度和网格线 -->
  <g stroke="#334155" stroke-width="1" opacity="0.5">
    <line x1="100" y1="480" x2="700" y2="480"/>
    <line x1="100" y1="400" x2="700" y2="400"/>
    <line x1="100" y1="320" x2="700" y2="320"/>
    <line x1="100" y1="240" x2="700" y2="240"/>
    <line x1="100" y1="160" x2="700" y2="160"/>
    <line x1="100" y1="80" x2="700" y2="80"/>
  </g>

  <!-- Y轴标签 -->
  <g font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="end">
    <text x="90" y="485">0</text>
    <text x="90" y="405">10,000</text>
    <text x="90" y="325">20,000</text>
    <text x="90" y="245">30,000</text>
    <text x="90" y="165">40,000</text>
    <text x="90" y="85">50,000</text>
  </g>

  <!-- 柱状图组 -->
  <g filter="url(#glow)">
    <!-- Lume: 418ms (高度比例: 418/50000 * 400 = 3.34px) -->
    <rect x="120" y="476.66" width="70" height="3.34" fill="url(#gradLume)" rx="2">
      <animate attributeName="height" from="0" to="3.34" dur="1.5s" fill="freeze"/>
      <animate attributeName="y" from="480" to="476.66" dur="1.5s" fill="freeze"/>
    </rect>
    <text x="155" y="465" font-family="sans-serif" font-size="18" font-weight="bold" fill="#575BC6" text-anchor="middle">255</text>

    <!-- Bash: 5237ms (高度比例: 5237/50000 * 400 = 41.9px) -->
    <rect x="230" y="438.1" width="70" height="41.9" fill="url(#gradBash)" rx="2">
      <animate attributeName="height" from="0" to="41.9" dur="1.5s" fill="freeze" begin="1.2s"/>
      <animate attributeName="y" from="480" to="438.1" dur="1.5s" fill="freeze" begin="1.2s"/>
    </rect>
    <text x="265" y="427" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">5237</text>

    <!-- dash: 3906ms (高度比例: 3906/50000 * 400 = 31.25px) -->
    <rect x="340" y="448.75" width="70" height="31.25" fill="url(#gradDash)" rx="2">
      <animate attributeName="height" from="0" to="31.25" dur="1.5s" fill="freeze" begin="2.4s"/>
      <animate attributeName="y" from="480" to="448.75" dur="1.5s" fill="freeze" begin="2.4s"/>
    </rect>
    <text x="375" y="437" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">3906</text>

    <!-- fish: 42399ms (高度比例: 42399/50000 * 400 = 339.19px) -->
    <rect x="450" y="140.81" width="70" height="339.19" fill="url(#gradFish)" rx="2">
      <animate attributeName="height" from="0" to="339.19" dur="1.5s" fill="freeze" begin="3.6s"/>
      <animate attributeName="y" from="480" to="140.81" dur="1.5s" fill="freeze" begin="3.6s"/>
    </rect>
    <text x="485" y="130" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">42399</text>
  </g>

  <!-- X轴标签 -->
  <text x="400" y="520" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Time (ms)</text>

  <!-- 图例 -->
  <g transform="translate(150, 540)">
    <rect x="0" y="0" width="20" height="15" fill="#4a7cff" rx="2"/>
    <text x="25" y="11" font-family="sans-serif" font-size="12" fill="#e2e8f0">Lume</text>
    
    <rect x="90" y="0" width="20" height="15" fill="#7ae582" rx="2"/>
    <text x="115" y="11" font-family="sans-serif" font-size="12" fill="#e2e8f0">Bash</text>
    
    <rect x="170" y="0" width="20" height="15" fill="#ffd966" rx="2"/>
    <text x="195" y="11" font-family="sans-serif" font-size="12" fill="#e2e8f0">dash</text>
    
    <rect x="250" y="0" width="20" height="15" fill="#ff6b6b" rx="2"/>
    <text x="275" y="11" font-family="sans-serif" font-size="12" fill="#e2e8f0">fish</text>
  </g>

  <!-- 坐标轴箭头 -->
  <polygon points="700,480 690,475 690,485" fill="#334155"/>
  <polygon points="100,80 95,90 105,90" fill="#334155"/>
</svg>
