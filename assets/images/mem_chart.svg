<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradLume" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5cdf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradBash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ae582;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fc956;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradDash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradFish" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="#0f1729"/>

  <text x="400" y="35" font-family="sans-serif" font-size="24" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    Memory usage
  </text>
  <text x="400" y="58" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    (idle)
  </text>

  <line x1="100" y1="480" x2="700" y2="480" stroke="#334155" stroke-width="2"/>

  <g stroke="#334155" stroke-width="1" opacity="0.5">
    <line x1="100" y1="480" x2="700" y2="480"/>
    <line x1="100" y1="400" x2="700" y2="400"/>
    <line x1="100" y1="320" x2="700" y2="320"/>
    <line x1="100" y1="240" x2="700" y2="240"/>
    <line x1="100" y1="160" x2="700" y2="160"/>
    <line x1="100" y1="80" x2="700" y2="80"/>
  </g>

  <g font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="end">
    <text x="90" y="485">0</text>
    <text x="90" y="405">3</text>
    <text x="90" y="325">6</text>
    <text x="90" y="245">9</text>
    <text x="90" y="165">12</text>
    <text x="90" y="85">15</text>
  </g>

  <g filter="url(#glow)">
    <!-- Lume: 5.4 MB -> y = 480 - (5.4/15)*400 = 480 - 144 = 336 -->
    <rect x="120" y="336" width="70" height="144" fill="url(#gradLume)" rx="2">
      <animate attributeName="height" from="0" to="144" dur="0.6s" fill="freeze"/>
      <animate attributeName="y" from="480" to="336" dur="0.6s" fill="freeze"/>
    </rect>
    <text x="155" y="322" font-family="sans-serif" font-size="18" font-weight="bold" fill="#575BC6" text-anchor="middle">5.4</text>

    <!-- Bash: 7.9 MB -> y = 480 - (7.9/15)*400 = 480 - 210.67 = 269.33 -->
    <rect x="230" y="269.33" width="70" height="210.67" fill="url(#gradBash)" rx="2">
      <animate attributeName="height" from="0" to="210.67" dur="0.6s" fill="freeze" begin="0.2s"/>
      <animate attributeName="y" from="480" to="269.33" dur="0.6s" fill="freeze" begin="0.2s"/>
    </rect>
    <text x="265" y="255" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">7.9</text>

    <!-- dash: 2.0 MB -> y = 480 - (2.0/15)*400 = 480 - 53.33 = 426.67 -->
    <rect x="340" y="426.67" width="70" height="53.33" fill="url(#gradDash)" rx="2">
      <animate attributeName="height" from="0" to="53.33" dur="0.6s" fill="freeze" begin="0.4s"/>
      <animate attributeName="y" from="480" to="426.67" dur="0.6s" fill="freeze" begin="0.4s"/>
    </rect>
    <text x="375" y="413" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">2.0</text>

    <!-- fish: 13.0 MB -> y = 480 - (13.0/15)*400 = 480 - 346.67 = 133.33 -->
    <rect x="450" y="133.33" width="70" height="346.67" fill="url(#gradFish)" rx="2">
      <animate attributeName="height" from="0" to="346.67" dur="0.6s" fill="freeze" begin="0.6s"/>
      <animate attributeName="y" from="480" to="133.33" dur="0.6s" fill="freeze" begin="0.6s"/>
    </rect>
    <text x="485" y="120" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">13.0</text>
  </g>

  <text x="400" y="520" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Memory (MB)</text>

  <g transform="translate(150, 550)">
    <rect x="0" y="0" width="20" height="15" fill="#4a7cff" rx="2"/>
    <text x="25" y="11" font-family="sans-serif" font-size="12" fill="#e2e8f0">Lume</text>
    
    <rect x="90" y="0" width="20" height="15" fill="#7ae582" rx="2"/>
    <text x="115" y="11" font-family="sans-serif" font-size="12" fill="#e2e8f0">Bash</text>
    
    <rect x="170" y="0" width="20" height="15" fill="#ffd966" rx="2"/>
    <text x="195" y="11" font-family="sans-serif" font-size="12" fill="#e2e8f0">dash</text>
    
    <rect x="250" y="0" width="20" height="15" fill="#ff6b6b" rx="2"/>
    <text x="275" y="11" font-family="sans-serif" font-size="12" fill="#e2e8f0">fish</text>
  </g>

  <polygon points="100,80 95,90 105,90" fill="#334155"/>
</svg>
