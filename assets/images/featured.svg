<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 240"
  width="400"
  height="240"
  aria-hidden="true"
>
  <defs>
    <style>
      text {
        font-family: ui-monospace, "Courier New", Courier, monospace;
      }
    </style>

    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a1a"/>
      <stop offset="50%" stop-color="#0b1029"/>
      <stop offset="100%" stop-color="#060a1a"/>
    </linearGradient>

    <!-- 光带 -->
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00a8ff" stop-opacity="0"/>
    </linearGradient>

    <!-- 粒子 -->
    <radialGradient id="p1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p2">
      <stop offset="0%" stop-color="#00a8ff"/>
      <stop offset="100%" stop-color="#00a8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p3">
      <stop offset="0%" stop-color="#ff5fbd"/>
      <stop offset="100%" stop-color="#ff5fbd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="240" fill="url(#bg)"/>

  <!-- 网格 -->
  <g opacity="0.12">
    <path d="M0 60H400" stroke="#1a3a5c" stroke-width="0.5"/>
    <path d="M0 120H400" stroke="#1a3a5c" stroke-width="0.5"/>
    <path d="M0 180H400" stroke="#1a3a5c" stroke-width="0.5"/>
    <path d="M100 0V240" stroke="#1a3a5c" stroke-width="0.5"/>
    <path d="M200 0V240" stroke="#1a3a5c" stroke-width="0.5"/>
    <path d="M300 0V240" stroke="#1a3a5c" stroke-width="0.5"/>
  </g>

  <!-- 扫描线 -->
  <rect x="0" y="-4" width="400" height="4" fill="#00ff88" opacity="0.15">
    <animate attributeName="y" from="-4" to="240" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- 横向光带 -->
  <rect x="-120" y="90" width="120" height="2" fill="url(#beam)">
    <animate attributeName="x" from="-120" to="400" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="-80" y="130" width="80" height="1.5" fill="url(#beam)">
    <animate attributeName="x" from="400" to="-80" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- 粒子 -->
  <circle cx="60" cy="50" r="30" fill="url(#p1)" opacity="0.35">
    <animate attributeName="cy" values="50;45;50" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="180" r="40" fill="url(#p2)" opacity="0.3">
    <animate attributeName="cy" values="180;185;180" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="25" fill="url(#p3)" opacity="0.25">
    <animate attributeName="cx" values="200;195;200" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 微型终端窗口 -->
  <rect x="30" y="30" width="340" height="180" rx="6"
        fill="#0d1117" stroke="#1a3a5c" stroke-width="1" opacity="0.9"/>

  <!-- 窗口按钮 -->
  <circle cx="46" cy="46" r="5" fill="#ff5f56"/>
  <circle cx="62" cy="46" r="5" fill="#ffbd2e"/>
  <circle cx="78" cy="46" r="5" fill="#27c93f"/>

  <!-- 终端内容 -->
  <g font-size="11">
    <text x="52" y="78" fill="#00ff88">
      <tspan fill="#00a8ff">&gt;</tspan> use lman
    </text>
    <text x="52" y="98" fill="#6b8a9e" opacity="0.8">
      Loading modules...
    </text>
    <text x="52" y="118" fill="#00ff88" opacity="0.9">
      ✓ Job Finished
    </text>

    <!-- 进度条 -->
    <rect x="52" y="134" width="260" height="6" rx="3" fill="#1a2a3a"/>
    <rect x="52" y="134" height="6" rx="3" fill="#00ff88" opacity="0.8">
      <animate attributeName="width" values="0;260;260" dur="2s" fill="freeze"/>
    </rect>

    <!-- 光标 -->
    <text x="52" y="162" fill="#00ff88">
      <tspan fill="#00a8ff">&gt;</tspan>
      <tspan opacity="0.8">_</tspan>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 右侧装饰 -->
  <g opacity="0.3">
    <path d="M360 50V190" stroke="#00ff88" stroke-width="1" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M372 70V170" stroke="#00a8ff" stroke-width="1" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" from="0" to="12" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 底部标签 -->
  <text x="200" y="228" text-anchor="middle" font-size="9" fill="#6b8a9e" opacity="0.5">
    TECH • CODE • BLOG
  </text>
</svg>
