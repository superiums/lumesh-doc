<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1084 322"
  width="1084"
  height="322"
  preserveAspectRatio="xMidYMid slice"
>
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1b3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e27;stop-opacity:1" />
    </linearGradient>
    
    <!-- 绿色发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 蓝色发光 -->
    <filter id="blueGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 扫描线效果 -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#00ff88" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    
    <!-- 网格背景 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3a5c" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="1084" height="322" fill="url(#bgGrad)"/>
  <rect width="1084" height="322" fill="url(#grid)"/>
  <rect width="1084" height="322" fill="url(#scanlines)"/>
  
  <!-- 顶部装饰线 -->
  <line x1="0" y1="2" x2="1084" y2="2" stroke="#00ff88" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- 左侧边框装饰 -->
  <rect x="10" y="20" width="3" height="282" fill="#00ff88" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- 终端标题栏 -->
  <rect x="30" y="25" width="480" height="35" rx="3" fill="#0d1b3e" stroke="#1a3a5c" stroke-width="1"/>
  <circle cx="45" cy="42" r="6" fill="#ff5f56" opacity="0.8"/>
  <circle cx="62" cy="42" r="6" fill="#ffbd2e" opacity="0.8"/>
  <circle cx="79" cy="42" r="6" fill="#27c93f" opacity="0.8"/>
  <text x="100" y="47" font-family="monospace" font-size="13" fill="#6b8a9e">
    terminal — blog@cyberdeck:~/
  </text>
  
  <!-- 命令行提示符和文本 -->
  <g font-family="monospace" font-size="15" filter="url(#glow)">
    <!-- 第一行 -->
    <text x="40" y="85" fill="#00ff88" opacity="0.9">
      <tspan fill="#00a8ff">➜</tspan> whoami
    </text>
    <text x="180" y="85" fill="#00ff88" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      cyberpunk_blogger
    </text>
    
    <!-- 第二行 -->
    <text x="40" y="115" fill="#00ff88" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
      <tspan fill="#00a8ff">➜</tspan> cat /dev/skills | grep "web"
    </text>
    <text x="300" y="115" fill="#00ff88" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.8s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" begin="3.3s" repeatCount="indefinite"/>
      Frontend • Backend • DevOps
    </text>
    
    <!-- 第三行 -->
    <text x="40" y="145" fill="#00ff88" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.5s" fill="freeze"/>
      <tspan fill="#00a8ff">➜</tspan> echo $BLOG_POSTS | wc -l
    </text>
    <text x="310" y="145" fill="#00ff88" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.3s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" begin="4.8s" repeatCount="indefinite"/>
      42
    </text>
    
    <!-- 第四行 - 当前命令 -->
    <text x="40" y="175" fill="#00ff88" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="5s" fill="freeze"/>
      <tspan fill="#00a8ff">➜</tspan> 
      <tspan id="typing" fill="#00ff88">_</tspan>
    </text>
  </g>
  
  <!-- 闪烁光标 -->
  <rect x="72" y="163" width="10" height="18" fill="#00ff88" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- 右侧装饰 - 数据流 -->
  <g opacity="0.4" filter="url(#blueGlow)">
    <circle cx="950" cy="60" r="3" fill="#00a8ff">
      <animate attributeName="cy" from="60" to="280" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="100" r="2" fill="#00ff88">
      <animate attributeName="cy" from="100" to="290" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="1010" cy="40" r="2.5" fill="#00a8ff">
      <animate attributeName="cy" from="40" to="300" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="1040" cy="80" r="2" fill="#00ff88">
      <animate attributeName="cy" from="80" to="310" dur="2s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
  </g>
  
  <!-- 右侧系统信息面板 -->
  <rect x="750" y="25" width="310" height="280" rx="5" fill="#0d1b3e" stroke="#1a3a5c" stroke-width="1" opacity="0.8"/>
  
  <!-- 系统信息标题 -->
  <text x="770" y="50" font-family="monospace" font-size="13" fill="#00a8ff" opacity="0.9">
    ◉ SYSTEM STATUS
  </text>
  <line x1="770" y1="58" x2="1040" y2="58" stroke="#1a3a5c" stroke-width="1"/>
  
  <!-- 系统信息内容 -->
  <g font-family="monospace" font-size="12" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    
    <text x="775" y="80" fill="#6b8a9e">HOSTNAME    :</text>
    <text x="910" y="80" fill="#00ff88">cyberdeck-01</text>
    
    <text x="775" y="100" fill="#6b8a9e">UPTIME      :</text>
    <text x="910" y="100" fill="#00ff88">99d 12h 34m</text>
    
    <text x="775" y="120" fill="#6b8a9e">SHELL       :</text>
    <text x="910" y="120" fill="#00ff88">zsh 5.9</text>
    
    <text x="775" y="140" fill="#6b8a9e">KERNEL      :</text>
    <text x="910" y="140" fill="#00ff88">6.1.0-rt</text>
    
    <text x="775" y="160" fill="#6b8a9e">CPU USAGE   :</text>
    <rect x="910" y="150" width="120" height="12" rx="2" fill="#1a2a3a"/>
    <rect x="910" y="150" width="65" height="12" rx="2" fill="#00ff88" opacity="0.6">
      <animate attributeName="width" values="65;85;65" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <text x="775" y="185" fill="#6b8a9e">MEMORY      :</text>
    <rect x="910" y="175" width="120" height="12" rx="2" fill="#1a2a3a"/>
    <rect x="910" y="175" width="90" height="12" rx="2" fill="#00a8ff" opacity="0.6">
      <animate attributeName="width" values="90;70;90" dur="4s" repeatCount="indefinite"/>
    </rect>
    
    <text x="775" y="210" fill="#6b8a9e">POSTS       :</text>
    <text x="910" y="210" fill="#00ff88">42 published</text>
    
    <text x="775" y="230" fill="#6b8a9e">VISITORS    :</text>
    <text x="910" y="230" fill="#00ff88">1,337 today</text>
    
    <text x="775" y="250" fill="#6b8a9e">STATUS      :</text>
    <text x="910" y="250" fill="#00ff88">
      ● ONLINE
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- 底部装饰线 -->
  <line x1="0" y1="320" x2="1084" y2="320" stroke="#00ff88" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- 角落装饰 -->
  <path d="M 15 15 L 15 35 M 15 15 L 35 15" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <path d="M 1069 15 L 1069 35 M 1069 15 L 1049 15" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <path d="M 15 307 L 15 287 M 15 307 L 35 307" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <path d="M 1069 307 L 1069 287 M 1069 307 L 1049 307" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
</svg>