<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1084 322"
  width="1084"
  height="322"
  preserveAspectRatio="xMidYMid slice"
  aria-hidden="true"
>
  <defs>
    <style>
      text {
        font-family: 'JetBrains Mono', ui-monospace, 'Courier New', Courier, monospace;
        font-size: 11px;
        font-weight: bold;
        fill: #c9d1d9;
      }
    </style>

    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>

    <!-- 键帽发光 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 扫描线 -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#0a1a2a" stroke-width="0.5"/>
    </pattern>

    <!-- 键帽径向渐变（内凹感） -->
    <radialGradient id="cap" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1084" height="322" fill="url(#bg)"/>
  <rect width="1084" height="322" fill="url(#scanlines)" opacity="0.25"/>

  <!-- 装饰底光 -->
  <rect x="-200" y="140" width="300" height="1" fill="#00ff88" opacity="0.15">
    <animate attributeName="x" from="-300" to="1084" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect x="600" y="180" width="400" height="1" fill="#00a8ff" opacity="0.1">
    <animate attributeName="x" from="1084" to="-400" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- ========== 键帽组（7颗） ========== -->
  <g filter="url(#glow)">

    <!-- ESC -->
    <g>
      <rect x="60" y="110" width="70" height="60" rx="6"
            fill="url(#cap)" stroke="#ff5f56" stroke-width="1.5" opacity="0.95"/>
      <text x="95" y="146" text-anchor="middle" fill="#ff5f56">ESC</text>
      <animate attributeName="cy" values="140;136;140" dur="3.2s" repeatCount="indefinite"/>
    </g>

    <!-- Ctrl -->
    <g>
      <rect x="160" y="112" width="80" height="60" rx="6"
            fill="url(#cap)" stroke="#ff7b72" stroke-width="1.5" opacity="0.95"/>
      <text x="200" y="148" text-anchor="middle" fill="#ff7b72">Ctrl</text>
      <animate attributeName="cy" values="142;138;142" dur="3.6s" repeatCount="indefinite"/>
    </g>

    <!-- Alt -->
    <g>
      <rect x="270" y="108" width="80" height="60" rx="6"
            fill="url(#cap)" stroke="#a78bfa" stroke-width="1.5" opacity="0.95"/>
      <text x="310" y="144" text-anchor="middle" fill="#a78bfa">Alt</text>
      <animate attributeName="cy" values="138;134;138" dur="2.8s" repeatCount="indefinite"/>
    </g>

    <!-- Shift -->
    <g>
      <rect x="380" y="110" width="80" height="60" rx="6"
            fill="url(#cap)" stroke="#fbbf24" stroke-width="1.5" opacity="0.95"/>
      <text x="420" y="146" text-anchor="middle" fill="#fbbf24">Shift</text>
      <animate attributeName="cy" values="140;136;140" dur="3.4s" repeatCount="indefinite"/>
    </g>

    <!-- Space（长条） -->
    <g>
      <rect x="490" y="118" width="140" height="60" rx="6"
            fill="url(#cap)" stroke="#34d399" stroke-width="1.5" opacity="0.95"/>
      <text x="560" y="152" text-anchor="middle" fill="#34d399">Space</text>
      <animate attributeName="cy" values="148;144;148" dur="4s" repeatCount="indefinite"/>
    </g>

    <!-- Enter -->
    <g>
      <rect x="660" y="112" width="90" height="60" rx="6"
            fill="url(#cap)" stroke="#22d3ee" stroke-width="1.5" opacity="0.95"/>
      <text x="705" y="148" text-anchor="middle" fill="#22d3ee">Enter</text>
      <animate attributeName="cy" values="142;138;142" dur="3s" repeatCount="indefinite"/>
    </g>

    <!-- Tab -->
    <g>
      <rect x="790" y="110" width="80" height="60" rx="6"
            fill="url(#cap)" stroke="#ec4899" stroke-width="1.5" opacity="0.95"/>
      <text x="830" y="146" text-anchor="middle" fill="#ec4899">Tab</text>
      <animate attributeName="cy" values="140;136;140" dur="3.8s" repeatCount="indefinite"/>
    </g>

    <!-- 右侧散落小功能键（装饰） -->
    <g opacity="0.6">
      <rect x="900" y="120" width="50" height="45" rx="5"
            fill="#1a2332" stroke="#6366f1" stroke-width="1"/>
      <text x="925" y="148" text-anchor="middle" font-size="9" fill="#818cf8">F1</text>

      <rect x="965" y="115" width="50" height="45" rx="5"
            fill="#1a2332" stroke="#6366f1" stroke-width="1"/>
      <text x="990" y="143" text-anchor="middle" font-size="9" fill="#818cf8">F2</text>

      <rect x="1000" y="170" width="60" height="45" rx="5"
            fill="#1a2332" stroke="#6366f1" stroke-width="1"/>
      <text x="1030" y="196" text-anchor="middle" font-size="9" fill="#818cf8">Meta</text>
    </g>

  </g>

  <!-- 底部装饰线 -->
  <line x1="0" y1="320" x2="1084" y2="320" stroke="#21262d" stroke-width="2" opacity="0.5"/>
</svg>