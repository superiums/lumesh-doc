<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1084 322"
  width="1084"
  height="322"
  preserveAspectRatio="xMidYMid slice"
  aria-hidden="true"
>
  <defs>
    <style>
      text {
        font-family: 'JetBrains Mono', ui-monospace, 'Courier New', Courier, monospace;
        font-size: 12px;
      }
    </style>

    <!-- 背景 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>

    <!-- 数据流渐变 -->
    <linearGradient id="flow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00a8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00a8ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00a8ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d2a8ff" stop-opacity="0"/>
    </linearGradient>

    <!-- 节点发光 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1084" height="322" fill="url(#bg)"/>

  <!-- 网格 -->
  <g opacity="0.08">
    <path d="M0 64H1084" stroke="#1e3a5f" stroke-width="0.5"/>
    <path d="M0 128H1084" stroke="#1e3a5f" stroke-width="0.5"/>
    <path d="M0 192H1084" stroke="#1e3a5f" stroke-width="0.5"/>
    <path d="M0 256H1084" stroke="#1e3a5f" stroke-width="0.5"/>
    <path d="M271 0V322" stroke="#1e3a5f" stroke-width="0.5"/>
    <path d="M542 0V322" stroke="#1e3a5f" stroke-width="0.5"/>
    <path d="M813 0V322" stroke="#1e3a5f" stroke-width="0.5"/>
  </g>

  <!-- 数据流光线 -->
  <g opacity="0.4">
    <rect x="-100" y="80" width="200" height="2" fill="url(#flow1)">
      <animate attributeName="x" from="-200" to="1084" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="-80" y="160" width="160" height="1.5" fill="url(#flow2)">
      <animate attributeName="x" from="1084" to="-160" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-120" y="240" width="180" height="1.5" fill="url(#flow1)">
      <animate attributeName="x" from="-200" to="1084" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 函数节点 -->
  <g filter="url(#glow)">
    <!-- 节点1: parse() -->
    <rect x="40" y="40" width="180" height="50" rx="6"
          fill="#161b22" stroke="#1f6feb" stroke-width="1.5" opacity="0.9"/>
    <text x="130" y="62" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">
      parse()
    </text>
    <text x="130" y="80" text-anchor="middle" fill="#8b949e" font-size="9">
      &amp;str -&gt; Result&lt;T&gt;
    </text>

    <!-- 箭头 1→2 -->
    <path d="M220 65 L290 65" stroke="#1f6feb" stroke-width="1.5" opacity="0.6" fill="none">
      <animate attributeName="stroke-dashoffset" from="0" to="12" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <polygon points="288,60 298,65 288,70" fill="#1f6feb" opacity="0.6"/>

    <!-- 节点2: tokenize() -->
    <rect x="300" y="40" width="180" height="50" rx="6"
          fill="#161b22" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
    <text x="390" y="62" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">
      tokenize()
    </text>
    <text x="390" y="80" text-anchor="middle" fill="#8b949e" font-size="9">
      &amp;str -&gt; Vec&lt;Token&gt;
    </text>

    <!-- 箭头 2→3 -->
    <path d="M480 65 L550 65" stroke="#7c3aed" stroke-width="1.5" opacity="0.6" fill="none">
      <animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <polygon points="548,60 558,65 548,70" fill="#7c3aed" opacity="0.6"/>

    <!-- 节点3: compile() -->
    <rect x="560" y="40" width="180" height="50" rx="6"
          fill="#161b22" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <text x="650" y="62" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">
      compile()
    </text>
    <text x="650" y="80" text-anchor="middle" fill="#8b949e" font-size="9">
      Vec&lt;Token&gt; -&gt; AST
    </text>

    <!-- 箭头 3→4 -->
    <path d="M740 65 L810 65" stroke="#f59e0b" stroke-width="1.5" opacity="0.6" fill="none">
      <animate attributeName="stroke-dashoffset" from="0" to="12" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <polygon points="808,60 818,65 808,70" fill="#f59e0b" opacity="0.6"/>

    <!-- 节点4: execute() -->
    <rect x="820" y="40" width="220" height="50" rx="6"
          fill="#161b22" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="930" y="62" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">
      execute()
    </text>
    <text x="930" y="80" text-anchor="middle" fill="#8b949e" font-size="9">
      AST -&gt; Value
    </text>

    <!-- 第二行节点 -->
    <!-- 节点5: validate() -->
    <rect x="40" y="140" width="180" height="50" rx="6"
          fill="#161b22" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
    <text x="130" y="162" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">
      validate()
    </text>
    <text x="130" y="180" text-anchor="middle" fill="#8b949e" font-size="9">
      Input -&gt; bool
    </text>

    <!-- 箭头 5→6 -->
    <path d="M220 165 L290 165" stroke="#ef4444" stroke-width="1.5" opacity="0.6" fill="none">
      <animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <polygon points="288,160 298,165 288,170" fill="#ef4444" opacity="0.6"/>

    <!-- 节点6: transform() -->
    <rect x="300" y="140" width="180" height="50" rx="6"
          fill="#161b22" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
    <text x="390" y="162" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">
      transform()
    </text>
    <text x="390" y="180" text-anchor="middle" fill="#8b949e" font-size="9">
      Value -&gt; Value
    </text>

    <!-- 箭头 6→7 -->
    <path d="M480 165 L550 165" stroke="#06b6d4" stroke-width="1.5" opacity="0.6" fill="none">
      <animate attributeName="stroke-dashoffset" from="0" to="12" dur="0.9s" repeatCount="indefinite"/>
    </path>
    <polygon points="548,160 558,165 548,170" fill="#06b6d4" opacity="0.6"/>

    <!-- 节点7: serialize() -->
    <rect x="560" y="140" width="180" height="50" rx="6"
          fill="#161b22" stroke="#ec4899" stroke-width="1.5" opacity="0.9"/>
    <text x="650" y="162" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="bold">
      serialize()
    </text>
    <text x="650" y="180" text-anchor="middle" fill="#8b949e" font-size="9">
      Value -&gt; String
    </text>

    <!-- 箭头 7→8 -->
    <path d="M740 165 L810 165" stroke="#ec4899" stroke-width="1.5" opacity="0.6" fill="none">
      <animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.3s" repeatCount="indefinite"/>
    </path>
    <polygon points="808,160 818,165 808,170" fill="#ec4899" opacity="0.6"/>

    <!-- 节点8: cache() -->
    <rect x="820" y="140" width="220" height="50" rx="6"
          fill="#161b22" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <text x="930" y="162" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">
      cache()
    </text>
    <text x="930" y="180" text-anchor="middle" fill="#8b949e" font-size="9">
      String -&gt; Cached
    </text>

    <!-- 第三行 - 数据管道 -->
    <rect x="40" y="240" width="1000" height="60" rx="8"
          fill="#0d1117" stroke="#21262d" stroke-width="1" opacity="0.7"/>

    <text x="60" y="265" fill="#58a6ff" font-size="10" font-weight="bold">
      Pipeline:
    </text>

    <g transform="translate(140, 250)">
      <rect x="0" y="0" width="100" height="28" rx="14"
            fill="#1f2937" stroke="#1f6feb" stroke-width="1"/>
      <text x="50" y="18" text-anchor="middle" fill="#58a6ff" font-size="10">
        Source
      </text>

      <text x="115" y="18" fill="#4a5568" font-size="14">→</text>

      <rect x="135" y="0" width="100" height="28" rx="14"
            fill="#1f2937" stroke="#7c3aed" stroke-width="1"/>
      <text x="185" y="18" text-anchor="middle" fill="#a78bfa" font-size="10">
        Lexer
      </text>

      <text x="250" y="18" fill="#4a5568" font-size="14">→</text>

      <rect x="265" y="0" width="100" height="28" rx="14"
            fill="#1f2937" stroke="#f59e0b" stroke-width="1"/>
      <text x="315" y="18" text-anchor="middle" fill="#fbbf24" font-size="10">
        Parser
      </text>

      <text x="380" y="18" fill="#4a5568" font-size="14">→</text>

      <rect x="395" y="0" width="100" height="28" rx="14"
            fill="#1f2937" stroke="#10b981" stroke-width="1"/>
      <text x="445" y="18" text-anchor="middle" fill="#34d399" font-size="10">
        Eval
      </text>

      <text x="510" y="18" fill="#4a5568" font-size="14">→</text>

      <rect x="525" y="0" width="100" height="28" rx="14"
            fill="#1f2937" stroke="#ec4899" stroke-width="1"/>
      <text x="575" y="18" text-anchor="middle" fill="#f472b6" font-size="10">
        Output
      </text>
    </g>

    <!-- Pipeline 流动光点 -->
    <circle cx="100" cy="265" r="3" fill="#58a6ff" opacity="0.8">
      <animate attributeName="cx" from="100" to="640" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 底部装饰线 -->
  <line x1="0" y1="320" x2="1084" y2="320" stroke="#21262d" stroke-width="2" opacity="0.5"/>
</svg>